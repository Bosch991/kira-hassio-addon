name: Kira
version: "1.9.0"
slug: kira
description: Local-first Kira Assist server for Home Assistant OS
url: "https://github.com/Bosch991/kira-hassio-addon"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
homeassistant_api: true
map:
  - addon_config:rw
ports:
  8787/tcp: 8787
  8765/tcp: 8765
ports_description:
  8787/tcp: Kira API
  8765/tcp: Kira media file server for TTS playback
options:
  openai_api_key: ""
  openai_model: "gpt-4.1-mini"
  kira_api_token: ""
  elevenlabs_api_key: ""
  elevenlabs_voice_id: ""
  default_media_player: ""
  media_base_url: ""
  openart_api_key: ""
  openart_kira_model_id: ""
  openart_kira_style_id: ""
  openart_kira_world_id: ""
  openart_default_project_id: ""
  log_level: "INFO"
  live_notifications: false
schema:
  openai_api_key: str
  openai_model: str
  kira_api_token: str
  elevenlabs_api_key: str
  elevenlabs_voice_id: str
  default_media_player: str
  media_base_url: str
  openart_api_key: str
  openart_kira_model_id: str
  openart_kira_style_id: str
  openart_kira_world_id: str
  openart_default_project_id: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  live_notifications: bool

